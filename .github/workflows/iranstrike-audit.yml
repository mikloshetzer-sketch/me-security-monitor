name: IranStrike Source Audit

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  iranstrike-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create output directory
        run: |
          mkdir -p data

      - name: Run IranStrike Audit
        run: |
          python scripts/audit_iranstrike.py

      - name: Upload audit artifacts
        uses: actions/upload-artifact@v4
        with:
          name: iranstrike-audit
          path: |
            data/iranstrike-audit.json
            data/iranstrike-audit.md

      - name: Commit updated audit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/iranstrike-audit.json
          git add data/iranstrike-audit.md

          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "Update IranStrike audit"
            git push
          fi
