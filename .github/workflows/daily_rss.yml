name: Daily RSS Update

on:
  workflow_dispatch:
  schedule:
    - cron: "15 */2 * * *"  # every 2 hours at HH:15 UTC

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Fetch RSS -> events.json
        run: |
          python scripts/fetch_rss.py

      - name: Generate daily signal
        run: |
          python scripts/generate_daily_signal.py

      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add events.json daily_signal.md
          git commit -m "Update events + daily signal" || echo "No changes"
          git push
