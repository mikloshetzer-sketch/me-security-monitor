name: Daily RSS Update

on:
  workflow_dispatch:
  schedule:
    - cron: "15 */2 * * *"   # every 2 hours (UTC)

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Fetch RSS feeds → events.json
        run: |
          python scripts/fetch_rss.py

      - name: Generate Daily Signal
        run: |
          python scripts/generate_daily_signal.py

      - name: Generate Hotspot Alert
        run: |
          python scripts/generate_hotspot_alert.py

      - name: Generate Security Signal
        run: |
          python scripts/generate_security_signal.py

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add events.json daily_signal.md hotspot_alert.md security-signal.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update RSS outputs and security signal"
            git push
          fi
