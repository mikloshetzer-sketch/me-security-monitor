name: Weekly Brief Generator

on:
  workflow_dispatch:
  schedule:
    - cron: "30 6 * * 3"  # Wed 06:30 UTC (Budapest: 07:30 winter / 08:30 summer)

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate brief.md (weekly)
        run: |
          python scripts/generate_brief.py

      - name: Commit brief + archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add brief.md archive/ || true
          git commit -m "Update weekly brief" || echo "No changes"
          git push
