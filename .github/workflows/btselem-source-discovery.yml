name: B'Tselem Source Discovery

on:
  workflow_dispatch:
    inputs:
      save_assets:
        description: "Save inspected HTML and JavaScript samples"
        required: false
        default: false
        type: boolean

      verbose:
        description: "Enable verbose logging"
        required: false
        default: false
        type: boolean

  schedule:
    # Once a week to avoid unnecessary requests.
    - cron: "20 5 * * 1"

permissions:
  contents: write

concurrency:
  group: btselem-source-discovery
  cancel-in-progress: false

jobs:
  discover-btselem-sources:
    name: Discover B'Tselem map sources
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Locate discovery script
        id: locate_script
        shell: bash
        run: |
          set -euo pipefail

          CANDIDATES=(
            "scripts/discover_btselem_sources.py"
            "discover_btselem_sources.py"
          )

          SCRIPT_PATH=""

          for CANDIDATE in "${CANDIDATES[@]}"; do
            if [[ -f "${CANDIDATE}" ]]; then
              SCRIPT_PATH="${CANDIDATE}"
              break
            fi
          done

          if [[ -z "${SCRIPT_PATH}" ]]; then
            SCRIPT_PATH="$(find . -maxdepth 4 -type f \
              -name "discover_btselem_sources.py" \
              -print -quit | sed 's#^\./##')"
          fi

          if [[ -z "${SCRIPT_PATH}" || ! -f "${SCRIPT_PATH}" ]]; then
            echo "ERROR: discover_btselem_sources.py was not found."
            find . -maxdepth 4 -type f -name "*.py" -print || true
            exit 1
          fi

          echo "Found discovery script: ${SCRIPT_PATH}"
          echo "script_path=${SCRIPT_PATH}" >> "$GITHUB_OUTPUT"

      - name: Verify discovery script
        run: |
          python -m py_compile \
            "${{ steps.locate_script.outputs.script_path }}"

      - name: Build command options
        id: options
        shell: bash
        run: |
          set -euo pipefail

          OPTIONS=""

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ inputs.save_assets }}" == "true" ]]; then
              OPTIONS="${OPTIONS} --save-assets"
            fi

            if [[ "${{ inputs.verbose }}" == "true" ]]; then
              OPTIONS="${OPTIONS} --verbose"
            fi
          fi

          echo "options=${OPTIONS}" >> "$GITHUB_OUTPUT"

      - name: Run respectful source discovery
        id: discovery
        shell: bash
        run: |
          set +e

          python "${{ steps.locate_script.outputs.script_path }}" \
            --url "https://www.btselem.org/map" \
            --output-dir data \
            --max-assets 12 \
            --timeout 30 \
            --retries 4 \
            --retry-base 20 \
            --retry-max 180 \
            --delay 1.5 \
            ${{ steps.options.outputs.options }}

          EXIT_CODE=$?
          set -e

          echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"

          case "${EXIT_CODE}" in
            0)
              echo "Structured candidate endpoint found."
              ;;
            2)
              echo "Discovery completed; no confirmed structured endpoint found."
              ;;
            3)
              echo "The runner remained rate-limited after retries."
              echo "A diagnostic report was generated; this is not treated as a code failure."
              ;;
            *)
              echo "Discovery failed with exit code ${EXIT_CODE}."
              exit "${EXIT_CODE}"
              ;;
          esac

      - name: Verify generated reports
        shell: bash
        run: |
          set -euo pipefail

          test -f data/btselem-discovery.json
          test -f data/btselem-discovery.md

          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(
              Path("data/btselem-discovery.json").read_text(encoding="utf-8")
          )

          print("Generated at:", report.get("generated_at"))
          print("Status:", report.get("status", "completed"))
          print(
              "Candidate endpoints:",
              len(report.get("candidate_endpoints", [])),
          )
          print(
              "Structured candidates:",
              report.get("structured_candidate_count", 0),
          )
          PY

      - name: Upload discovery reports
        uses: actions/upload-artifact@v4
        with:
          name: btselem-source-discovery-${{ github.run_number }}
          path: |
            data/btselem-discovery.json
            data/btselem-discovery.md
            data/btselem-discovery/raw/
          if-no-files-found: warn
          retention-days: 30

      - name: Commit updated reports
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/btselem-discovery.json
          git add data/btselem-discovery.md

          if [[ -d data/btselem-discovery/raw ]]; then
            git add data/btselem-discovery/raw
          fi

          if git diff --cached --quiet; then
            echo "No report changes to commit."
            exit 0
          fi

          git commit -m "Update B'Tselem source discovery"
          git push


