name: B'Tselem Source Discovery

on:
  workflow_dispatch:
    inputs:
      save_assets:
        description: "Save inspected HTML and JavaScript samples"
        required: false
        default: false
        type: boolean

      verbose:
        description: "Enable verbose logging"
        required: false
        default: false
        type: boolean

  schedule:
    # Every Monday at 05:20 UTC
    - cron: "20 5 * * 1"

permissions:
  contents: write

concurrency:
  group: btselem-source-discovery
  cancel-in-progress: false

jobs:
  discover-btselem-sources:
    name: Discover B'Tselem map sources
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Verify discovery script
        run: |
          test -f scripts/discover_btselem_sources.py
          python -m py_compile scripts/discover_btselem_sources.py

      - name: Build command options
        id: options
        shell: bash
        run: |
          OPTIONS=""

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ inputs.save_assets }}" == "true" ]]; then
              OPTIONS="${OPTIONS} --save-assets"
            fi

            if [[ "${{ inputs.verbose }}" == "true" ]]; then
              OPTIONS="${OPTIONS} --verbose"
            fi
          fi

          echo "options=${OPTIONS}" >> "$GITHUB_OUTPUT"

      - name: Run B'Tselem source discovery
        id: discovery
        shell: bash
        run: |
          set +e

          python scripts/discover_btselem_sources.py \
            --url "https://www.btselem.org/map" \
            --output-dir data \
            --max-assets 40 \
            --timeout 25 \
            ${{ steps.options.outputs.options }}

          EXIT_CODE=$?
          set -e

          echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"

          if [[ "${EXIT_CODE}" -eq 0 ]]; then
            echo "Structured candidate endpoint found."
          elif [[ "${EXIT_CODE}" -eq 2 ]]; then
            echo "Discovery completed, but no confirmed structured endpoint was found."
          else
            echo "Discovery failed with exit code ${EXIT_CODE}."
            exit "${EXIT_CODE}"
          fi

      - name: Verify generated reports
        shell: bash
        run: |
          test -f data/btselem-discovery.json
          test -f data/btselem-discovery.md

          python - <<'PY'
          import json
          from pathlib import Path

          report_path = Path("data/btselem-discovery.json")
          report = json.loads(report_path.read_text(encoding="utf-8"))

          print("Generated at:", report.get("generated_at"))
          print(
              "Candidate endpoints:",
              len(report.get("candidate_endpoints", [])),
          )
          print(
              "Structured candidates:",
              report.get("structured_candidate_count", 0),
          )
          PY

      - name: Upload discovery reports
        uses: actions/upload-artifact@v4
        with:
          name: btselem-source-discovery-${{ github.run_number }}
          path: |
            data/btselem-discovery.json
            data/btselem-discovery.md
            data/btselem-discovery/raw/
          if-no-files-found: warn
          retention-days: 30

      - name: Commit updated discovery reports
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/btselem-discovery.json
          git add data/btselem-discovery.md

          if [[ -d data/btselem-discovery/raw ]]; then
            git add data/btselem-discovery/raw
          fi

          if git diff --cached --quiet; then
            echo "No discovery report changes to commit."
            exit 0
          fi

          git commit -m "Update B'Tselem source discovery"
          git push
